    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
   width: 100%;
   font-family: roboto,sans-serif;
   background: #0c111b;
   position: relative;
}

.navbar {
width: 100%;
position: fixed;
height: 80px;
top: 0;
left: 0;
background: #0c111b;
padding: 0 4%;
display: flex;
align-items: center;
z-index: 9;
}

.brand-logo{
    height: 70px;
}

.nav-links{
    margin-top: 10px;
    list-style: none;
    display: flex;
}

.nav-items a{
    text-decoration: none;
    margin-left: 20px;
    text-transform: capitalize;
    color: #fff;
    opacity: 0.9;
}

.right-container{
    margin-left: auto;
    display: block;
}

.search-box{
    background: transparent;
    outline: none;
    border: none;
    border-bottom: 1px solid #aaa;
    color: #fff;
    height: 30px;
    width: 250px;
    text-transform: capitalize;
    font-size: 16px;
    font-weight: 500;
    transition: 0.5s;
}

.search-box:focus{
    width: 400px;
    border-color: #1f80e0;
}

.sub-btn{
    background: #1f80e0;
    height: 30px;
    color: #fff;
    padding: 0 20px;
    border-radius: 5px;
    border: none;
    outline: none;
    text-transform: uppercase;
    font-weight: 700;
    font-size: 12px;
    margin: 0 10px;
}

.login-link{
    opacity: 0.9;
    color: #fff;
    text-transform: uppercase;
    font-weight: 700;
    font-size: 15px;
    text-decoration: none;
}

.caraousel-container {
    width: 100%;
    position: relative;
    height: 450px;
    overflow-x: hidden;
    padding: 20px 0;
    margin-top: 80px;
}

.caraousel {
    display: flex;
    width: 92%;
    height: 100%;
    position: relative;
    margin: auto;
}

.slider {
    flex: 0 0 auto;
    position: relative;
    margin-right: 30px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 5px;
    height: 100%;
    width: 100%;
    left: 0;
    transition: 1s;
    overflow: hidden;
}

.slider img {
    width: 70%;
    min-height: 100%;
    object-fit: cover;
    display: block; 
    margin-left: auto;
}

.slide-content {
    position: absolute;
    width: 50%;
    height: 100%;
    z-index: 2;
    background: linear-gradient(to right, #030b17 80%, #0c111b00);
    color: #fff;
}

.movie-title{
    padding-left: 50px;
    text-transform: capitalize;
    margin-top: 80px;
}

.movie-description{
    width: 80%;
    line-height: 30px;
    padding-left: 50px;
    margin-top: 30px;
    opacity: 0.8;
}
    </style>
